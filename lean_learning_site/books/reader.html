<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#efe7d2">
  <meta name="description" content="Lean 4 中文教材在线阅读器">
  <title>阅读器 · Lean 4 学习工作台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@500;600;700;800&family=Inter:wght@400;500;600&family=Noto+Serif+SC:wght@600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="./books.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/styles/github.min.css">
</head>
<body class="reader-page">
  <div class="shell">
    <aside class="side-rail left" aria-hidden="true"><span class="rail-text">Lean 4</span></aside>
    <aside class="side-rail right" aria-hidden="true"><span class="rail-text">阅读器</span></aside>

    <header class="site-chrome">
      <div class="topbar">
        <div class="container topbar-inner">
          <span><b>教材阅读器</b> · 侧边栏目录</span>
          <span class="accent">KaTeX · highlight.js</span>
          <span><a href="./index.html">教材库</a></span>
        </div>
      </div>
      <div class="container nav" aria-label="主导航">
        <a class="brand" href="../index.html">
          <span class="brand-mark">∀</span>
          <span>Lean 4 学习工作台</span>
        </a>
        <div class="nav-links">
          <a href="../index.html">首页</a>
          <a href="./index.html">中文教材</a>
          <a href="./search.html">搜索</a>
        </div>
      </div>
    </header>

    <div class="reader-shell">
      <div class="search-bar-wrap">
        <div class="search-controls">
          <div class="search-field">
            <label class="search-label" for="reader-search">搜索教材</label>
            <input id="reader-search" class="search-input" type="search" placeholder="搜索章节标题、正文或文内标题…" autocomplete="off" spellcheck="false">
          </div>
          <div class="search-field search-field-filter">
            <label class="search-label" for="reader-search-filter">范围</label>
            <select id="reader-search-filter" class="search-filter"></select>
          </div>
        </div>
        <p id="reader-search-hint" class="search-scope-hint" hidden></p>
        <div id="reader-search-results" class="search-results" hidden></div>
      </div>

      <div class="reader-layout">
        <aside class="reader-sidebar" aria-label="章节目录">
          <h2 id="sidebar-title">目录</h2>
          <div id="book-switch" class="book-switch"></div>
          <nav id="reader-toc" class="reader-toc" aria-label="当前书籍目录"></nav>
          <div id="reader-headings-wrap" class="reader-headings-wrap" hidden>
            <h3>本章导航</h3>
            <nav id="reader-headings" class="reader-headings" aria-label="本章标题导航"></nav>
          </div>
        </aside>

        <article class="reader-main">
          <div class="reader-toolbar">
            <div class="crumbs" id="crumbs"></div>
            <div class="nav-buttons">
              <button type="button" id="prev-btn">上一篇</button>
              <button type="button" id="next-btn">下一篇</button>
            </div>
          </div>
          <div id="reader-content" class="reader-content">
            <p class="reader-status">正在加载…</p>
          </div>
        </article>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.1.0/dist/fuse.min.js"></script>
  <script type="module" src="./reader.js"></script>
</body>
</html>
